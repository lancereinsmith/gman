[project]
site_name = "gman"
site_description = "List, manage, and export your GitHub repositories from the terminal."
site_author = "Lance Reinsmith"
site_url = "https://lreinsmith.github.io/gman/"
copyright = "&copy; 2026 Lance Reinsmith"
repo_url = "https://github.com/lreinsmith/gman"

docs_dir = "docs"
site_dir = "site"
use_directory_urls = true

[project.theme]
variant = "modern"
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.top",
    "navigation.path",
    "toc.follow",
    "content.code.copy",
    "content.code.annotate",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[[project.nav]]
Home = "index.md"

[[project.nav]]
"Getting started" = "getting-started.md"

[[project.nav]]
Commands = "usage.md"

[[project.nav]]
"The TUI" = "tui.md"

[[project.nav]]
"Tokens & permissions" = "tokens.md"

[[project.nav]]
"Excel export" = "excel.md"

[[project.nav]]
"Scripting with Python" = "api.md"
